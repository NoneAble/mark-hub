components:
  schemas:
    AnnBatch:
      properties:
        atomic:
          type: boolean
          title: Atomic
          default: true
        items:
          items:
            additionalProperties: true
            type: object
          type: array
          title: Items
      type: object
      required:
      - items
      title: AnnBatch
    AnnPatch:
      properties:
        status:
          anyOf:
          - type: string
          - type: 'null'
          title: Status
        risk:
          anyOf:
          - type: string
          - type: 'null'
          title: Risk
        price_tag:
          anyOf:
          - type: string
          - type: 'null'
          title: Price Tag
        category:
          anyOf:
          - type: string
          - type: 'null'
          title: Category
        group_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Group Id
        secondary_group_ids:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          title: Secondary Group Ids
        note:
          anyOf:
          - type: string
          - type: 'null'
          title: Note
        fields:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Fields
      type: object
      title: AnnPatch
    ApplyBody:
      properties:
        issue_ids:
          items:
            type: string
          type: array
          title: Issue Ids
        mark_link_status:
          type: boolean

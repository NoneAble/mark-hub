          title: Payload
        folder_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Folder Id
        visibility:
          anyOf:
          - type: string
          - type: 'null'
          title: Visibility
        is_archived:
          anyOf:
          - type: boolean
          - type: 'null'
          title: Is Archived
        tags:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          title: Tags
      type: object
      required:
      - action
      - ids
      title: BatchBody
    Body_import_file_api_v1_backup_import_file_post:
      properties:
        file:
          type: string
          contentMediaType: application/octet-stream
          title: File
        format:
          type: string
          title: Format
          default: json
        strategy:
          type: string
          title: Strategy
          default: skip_duplicate
        confirm_replace:
          type: boolean
          title: Confirm Replace
          default: false
      type: object
      required:
      - file
      title: Body_import_file_api_v1_backup_import_file_post
    BookmarkCreate:
      properties:
        title:
          anyOf:
          - type: string
          - type: 'null'
          title: Title
        url:
          type: string
          title: Url
        folder_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Folder Id
        description:
          anyOf:
          - type: string
          - type: 'null'
          title: Description
        icon:
          anyOf:
          - type: string
          - type: 'null'
          title: Icon
        visibility:
          anyOf:
          - type: string
          - type: 'null'
          title: Visibility
          default: private
        is_favorite:
          type: boolean
          title: Is Favorite
          default: false
        is_archived:
          type: boolean
          title: Is Archived
          default: false
        tags:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          title: Tags
        sort_order:
          anyOf:
          - type: integer
          - type: 'null'
          title: Sort Order
      type: object
      required:
      - url
      title: BookmarkCreate
    BookmarkPatch:
      properties:
        title:
          anyOf:
          - type: string
          - type: 'null'
          title: Title
        url:
          anyOf:
          - type: string
          - type: 'null'
          title: Url
        folder_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Folder Id
        description:
          anyOf:
          - type: string
          - type: 'null'
          title: Description
        icon:
          anyOf:
          - type: string
          - type: 'null'
          title: Icon
        visibility:
          anyOf:
          - type: string
          - type: 'null'
          title: Visibility
        is_favorite:
          anyOf:
          - type: boolean
          - type: 'null'
          title: Is Favorite
        is_archived:
          anyOf:
          - type: boolean
          - type: 'null'
          title: Is Archived
        tags:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          title: Tags
        sort_order:

name = "mark-hub"
main = "src/index.ts"
compatibility_date = "2026-07-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "markhub"
database_id = "d4e64eb9-3ee4-4f17-8f4d-29a9f6af5299"
migrations_dir = "migrations"

[assets]
directory = "../web/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
# API routes must reach the Worker even for browser navigation requests —
# since compat date 2025-04-01 the SPA fallback would otherwise serve HTML for
# navigate-mode /api/* requests (MH-CF-001).
run_worker_first = ["/api/*"]

[vars]
DEFAULT_ADMIN_USERNAME = "admin"

# Secrets (set via wrangler secret put):
# JWT_SECRET
# MARKHUB_MASTER_KEY
# DEFAULT_ADMIN_PASSWORD

# Every 15 minutes: HH:mm backup window matching (RQG-CF-SCHEDULE-001)
[triggers]
crons = ["*/15 * * * *"]

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
invocation_logs = true

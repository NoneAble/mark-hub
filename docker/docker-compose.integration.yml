services:
  markhub-sqlite:
    image: ${MARKHUB_TEST_IMAGE}
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "127.0.0.1:${MARKHUB_SQLITE_PORT}:8000"
    volumes:
      - sqlite-data:/app/server/data
    environment: &app-environment
      JWT_SECRET: ${JWT_SECRET}
      MARKHUB_MASTER_KEY: ${MARKHUB_MASTER_KEY}
      DEFAULT_ADMIN_USERNAME: ${DEFAULT_ADMIN_USERNAME}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD}
      FORCE_ADMIN_PASSWORD_CHANGE: "false"
      CORS_ORIGINS: "*"
    healthcheck: &app-healthcheck
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health')
      interval: 2s
      timeout: 2s
      retries: 40
      start_period: 5s

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 2s
      timeout: 2s
      retries: 40

  markhub-postgres:
    image: ${MARKHUB_TEST_IMAGE}
    ports:
      - "127.0.0.1:${MARKHUB_POSTGRES_PORT}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *app-environment
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    healthcheck: *app-healthcheck

  markhub-postgres-legacy:
    image: ${MARKHUB_TEST_IMAGE}
    ports:
      - "127.0.0.1:${MARKHUB_LEGACY_PORT}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *app-environment
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/markhub_legacy
    healthcheck: *app-healthcheck

volumes:
  sqlite-data:
  postgres-data:
